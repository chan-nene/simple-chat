[model]
target = "gpt-5.6-luna"
label = "GPT-5.6 Luna"

[responses]
instructions = """
あなたは簡潔で実用的なアシスタントです。
原則として日本語で回答してください。
コードを提示するときはMarkdownコードフェンスを使用してください。
事実と推測を区別してください。
"""
max_output_tokens = 8192

[messages]
max_text_length = 100000

[images]
enabled = true
max_files = 4
max_file_size_mb = 10
max_dimension_px = 2048
max_decoded_pixels = 40000000
webp_quality = 90

[database]
path = "data/chat.db"

[storage]
upload_directory = "data/uploads"
temp_directory = "data/tmp"

[server]
host = "127.0.0.1"
port = 8000
max_request_size_mb = 45

[ui]
title = "Simple Chat"
ai_icon = "/ai-icon.svg"
