<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Simple Chat</title>
  <link rel="icon" id="app-icon" href="/ai-icon.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <a class="skip-link" href="#composer-input">入力欄へ移動</a>
  <div class="app-shell" id="app-shell">
    <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>
    <aside class="sidebar" id="sidebar" aria-label="会話一覧">
      <header class="brand-block">
        <div class="brand-copy">
          <h1 id="app-title">Simple Chat</h1>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="サイドバーを折りたたむ" aria-expanded="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <path d="M9 3v18"></path>
            <path class="toggle-arrow" d="m16 9-3 3 3 3"></path>
          </svg>
        </button>
      </header>

      <button class="new-chat-button" id="new-chat" type="button">
        <span aria-hidden="true">＋</span>
        <span>新しいチャット</span>
      </button>

      <nav class="conversation-list" id="conversation-list" aria-label="保存済みの会話"></nav>
    </aside>

    <main class="main-panel">
      <button class="menu-button" id="open-sidebar" type="button" aria-label="サイドバーを開く">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <path d="M9 3v18"></path>
          <path d="m14 9 3 3-3 3"></path>
        </svg>
      </button>

      <section class="system-banner" id="system-banner" role="status" hidden>
        <span class="banner-symbol" aria-hidden="true">!</span>
        <span id="system-banner-text"></span>
      </section>

      <section class="message-stage" id="message-stage" aria-label="メッセージ">
        <div class="messages" id="messages" aria-live="off"></div>
        <button class="jump-latest" id="jump-latest" type="button" hidden>最新へ移動 ↓</button>
      </section>

      <section class="composer-zone" id="composer-zone">
        <div class="drop-signal" id="drop-signal" aria-hidden="true">画像をここへドロップ</div>
        <div class="attachment-tray" id="attachment-tray" aria-label="添付画像" hidden></div>
        <div class="composer-frame">
          <textarea
            id="composer-input"
            rows="1"
            maxlength="100000"
            aria-label="メッセージ"
            disabled
          ></textarea>
          <div class="composer-toolbar">
            <div class="composer-tools">
              <input id="file-input" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden>
              <button class="attach-button" id="attach-button" type="button" aria-label="画像を添付" title="画像を添付" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3" y="4" width="15" height="16" rx="2"></rect>
                  <circle cx="8" cy="9" r="1.5"></circle>
                  <path d="m4 17 4.5-4.5 3 3 2-2 4.5 4.5"></path>
                </svg>
              </button>
              <span class="context-usage" id="context-usage" title="直近のResponseが使用した入力トークン数" hidden></span>
            </div>
            <div class="send-controls">
              <span class="send-reason" id="send-reason"></span>
              <strong class="composer-model" id="model-name" aria-label="使用モデル">—</strong>
              <button class="stop-button" id="stop-button" type="button" hidden>停止</button>
              <button class="send-button" id="send-button" type="button" aria-label="送信" title="送信" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m21 3-7.2 18-3.1-7.7L3 10.2 21 3Z"></path>
                  <path d="m10.7 13.3 4.1-4.1"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div class="visually-hidden" id="stream-status" aria-live="polite" aria-atomic="true"></div>

  <div class="delete-confirm" id="delete-confirm" role="dialog" aria-label="会話を削除" hidden>
    <div class="delete-confirm-actions">
      <button class="secondary-button" id="delete-confirm-cancel" type="button">キャンセル</button>
      <button class="danger-button" id="delete-confirm-submit" type="button">削除</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.11/dist/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
