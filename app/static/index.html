<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Simple Chat</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/vendor/github-dark-11.11.1.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <a class="skip-link" href="#composer-input">入力欄へ移動</a>
  <div class="app-shell" id="app-shell">
    <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>
    <aside class="sidebar" id="sidebar" aria-label="会話一覧">
      <header class="brand-block">
        <div class="brand-copy">
          <p class="eyebrow">LOCAL CHAT</p>
          <h1 id="app-title">Simple Chat</h1>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="サイドバーを折りたたむ" aria-expanded="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <path d="M9 3v18"></path>
            <path class="toggle-arrow" d="m16 9-3 3 3 3"></path>
          </svg>
        </button>
      </header>

      <button class="new-chat-button" id="new-chat" type="button">
        <span aria-hidden="true">＋</span>
        <span>新しいチャット</span>
      </button>

      <div class="sidebar-section-label">
        <span>会話ログ</span>
        <span id="conversation-count">0</span>
      </div>
      <nav class="conversation-list" id="conversation-list" aria-label="保存済みの会話"></nav>

      <footer class="retention-note">
        <label class="model-control" for="model-select">
          <span>応答モデル</span>
          <select id="model-select" aria-label="使用モデル" disabled></select>
        </label>
        <span>履歴は最終更新から <strong id="retention-days">7日</strong> で自動削除されます。</span>
      </footer>
    </aside>

    <main class="main-panel">
      <button class="menu-button" id="open-sidebar" type="button" aria-label="サイドバーを開く">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <path d="M9 3v18"></path>
          <path d="m14 9 3 3-3 3"></path>
        </svg>
      </button>

      <section class="system-banner" id="system-banner" role="status" hidden>
        <span class="banner-symbol" aria-hidden="true">!</span>
        <span id="system-banner-text"></span>
      </section>

      <section class="message-stage" id="message-stage" aria-label="メッセージ">
        <div class="empty-state" id="empty-state">
          <h3>ここから会話を始めます</h3>
          <p>履歴本文を再送せず、OpenAI の Response 連鎖で文脈を継続します。</p>
        </div>
        <div class="messages" id="messages" aria-live="off"></div>
        <button class="jump-latest" id="jump-latest" type="button" hidden>最新へ移動 ↓</button>
      </section>

      <section class="composer-zone" id="composer-zone">
        <div class="drop-signal" id="drop-signal" aria-hidden="true">画像をここへドロップ</div>
        <div class="attachment-tray" id="attachment-tray" aria-label="添付画像" hidden></div>
        <div class="composer-frame">
          <textarea
            id="composer-input"
            rows="1"
            maxlength="100000"
            aria-label="メッセージ"
            placeholder="メッセージを入力…"
            disabled
          ></textarea>
          <div class="composer-toolbar">
            <div class="composer-tools">
              <input id="file-input" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden>
              <button class="attach-button" id="attach-button" type="button" aria-label="画像を添付" disabled>
                <span aria-hidden="true">⌁</span><span>画像</span>
              </button>
              <span class="character-count" id="character-count">0 / 100,000</span>
            </div>
            <div class="send-controls">
              <span class="send-reason" id="send-reason"></span>
              <button class="stop-button" id="stop-button" type="button" hidden>停止</button>
              <button class="send-button" id="send-button" type="button" aria-label="送信" title="送信" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m21 3-7.2 18-3.1-7.7L3 10.2 21 3Z"></path>
                  <path d="m10.7 13.3 4.1-4.1"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <p class="composer-hint">
          <span>Enter で送信 · Shift + Enter で改行 · Esc で停止</span>
          <span id="upload-limits"></span>
        </p>
      </section>
    </main>
  </div>

  <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div class="visually-hidden" id="stream-status" aria-live="polite" aria-atomic="true"></div>

  <dialog class="confirm-dialog" id="confirm-dialog" aria-labelledby="dialog-title">
    <form method="dialog">
      <p class="eyebrow">CONFIRM ACTION</p>
      <h2 id="dialog-title">確認</h2>
      <p id="dialog-message"></p>
      <div class="dialog-actions">
        <button class="secondary-button" id="dialog-cancel" value="cancel">キャンセル</button>
        <button class="primary-button" id="dialog-confirm" value="confirm">続行</button>
      </div>
    </form>
  </dialog>

  <dialog class="rename-dialog" id="rename-dialog" aria-labelledby="rename-title">
    <form method="dialog" id="rename-form">
      <p class="eyebrow">EDIT LEDGER TITLE</p>
      <h2 id="rename-title">会話タイトルを変更</h2>
      <label for="rename-input">タイトル</label>
      <input id="rename-input" type="text" maxlength="100" autocomplete="off" required>
      <p class="field-note">1〜100文字</p>
      <div class="dialog-actions">
        <button class="secondary-button" id="rename-cancel" value="cancel">キャンセル</button>
        <button class="primary-button" id="rename-save" value="confirm">保存</button>
      </div>
    </form>
  </dialog>

  <script src="/vendor/marked-15.0.12.umd.js"></script>
  <script src="/vendor/purify-3.4.11.min.js"></script>
  <script src="/vendor/highlight-11.11.1.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
